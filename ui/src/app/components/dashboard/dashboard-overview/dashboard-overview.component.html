<div class="row mt-2">
  <div class="col-6 col-md-6 col-lg-3 mb-3">
    <div class="card text-white bg-success m-auto">
      <div
        class="card-body d-flex flex-column justify-content-center align-items-center"
      >
        <p class="card-text">Total Areas Enabled</p>
        <h1 class="card-title">{{ areasEnabled.length }}</h1>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-6 col-lg-3 mb-3 area-status">
    <div class="card text-white bg-success-light m-auto">
      <div class="card-body overflow-auto p-2">
        <h6 class="text-center">Areas Currently Enabled</h6>
        <ul *ngFor="let area of areas">
          <li *ngIf="area.status === true">
            {{ area.name | area }}
          </li>
        </ul>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-6 col-lg-3 mb-3">
    <div class="card text-white bg-danger m-auto">
      <div
        class="card-body d-flex flex-column justify-content-center align-items-center"
      >
        <p class="card-text">Total Areas Disabled</p>
        <h1 class="card-title">{{ areasDisabled.length }}</h1>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-6 col-lg-3 mb-3 area-status">
    <div class="card text-white bg-danger-light m-auto">
      <div class="card-body overflow-auto p-2">
        <h6 class="text-center">Areas Currently Disabled</h6>
        <ul *ngFor="let area of areas">
          <li *ngIf="area.status === false">
            {{ area.name | area }}
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
