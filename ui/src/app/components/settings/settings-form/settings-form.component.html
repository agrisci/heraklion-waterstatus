<div class="card mt-2">
  <div class="card-header d-flex justify-content-between">
    <div class="d-flex">
      <mat-icon>settings</mat-icon>
      <h5 class="ms-2">Settings</h5>
    </div>
    <app-post-confirmation *ngIf="isValid"></app-post-confirmation>
  </div>
  <div class="card-body">
    <form #settingsForm="ngForm" (ngSubmit)="onSubmit(settingsForm)">
      <div class="form-group">
        <label for="webScraperInterval">Web Scraper Interval</label>
        <input
          type="number"
          class="form-control"
          id="webScraperInterval"
          name="webScraperInterval"
          [(ngModel)]="settings.web_scraper_interval"
        />
      </div>
      <div class="form-group">
        <label for="serverEmail">Server Email</label>
        <input
          type="email"
          class="form-control"
          id="serverEmail"
          name="serverEmail"
          [(ngModel)]="settings.server_email"
        />
      </div>
      <div class="form-group">
        <label for="serverPassword">Server Password</label>
        <input
          type="password"
          class="form-control"
          id="serverPassword"
          name="serverPassword"
          [(ngModel)]="settings.server_password"
        />
      </div>
      <div class="text-center">
        <button type="submit" class="btn btn-warning mt-3">
          Update Settings
        </button>
      </div>
    </form>
  </div>
</div>
